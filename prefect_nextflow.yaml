name: cyp2d6-copy
#prefect-version: 3.6.16

# preparation
build:
- prefect.deployments.steps.run_shell_script:
    id: get-commit-hash
    script: git rev-parse --short HEAD
    stream_output: false
# Билд для деплоймента nextflow_pipeline_cpu
- prefect_docker.deployments.steps.build_docker_image:
    id: build-image-nextflow
    requires: prefect-docker>=0.3.1
    image_name: kbaybekov/cyp2d6-copy-nextflow
    tag: "{{ get-commit-hash.stdout }}"
    dockerfile: Dockerfile.nextflow
    nocache: true
    platform: linux/amd64

push:
# Пуш для деплоймента nextflow_pipeline_cpu
- prefect_docker.deployments.steps.push_docker_image:
      requires: prefect-docker>=0.3.1
      image_name: '{{ build-image-nextflow.image_name }}'
      tag: '{{ build-image-nextflow.tag }}'

# runtime steps
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /opt/prefect/
  - prefect.deployments.steps.git_clone:
      id: clone-step
      repository: https://github.com/KBaybekov/copy_number.git
  - prefect.deployments.steps.pip_install_requirements:
      directory: "{{ clone-step.directory }}" # `clone-step` is a user-provided `id` field
      requirements_file: requirements_nextflow.txt

# 2. Описываем деплои, ссылаясь на конкретный ID сборки (Этаж 1)
deployments:
  - name: nextflow_pipeline_cpu
    version: '{{ build-image-nextflow.tag }}'
    schedules: []
    tags: ['cpu', 'nextflow', 'subflow']
    work_pool:
      name: nanopore_docker_pool
      work_queue_name: cpu_nodes
    job_variables:
      image: "{{ build-image-nextflow.image }}"
      image_pull_policy: "Always"
    description: "Flow for processing Nextflow pipelines on CPU workers"
    flow_name: "[CPU] Nextflow Runner"
    entrypoint: src/flows/nextflow_pipeline_cpu.py:nextflow_pipeline_cpu
    concurrency_limit:
      limit: 50
      collision_strategy: ENQUEUE
      grace_period_seconds: 300 # время, за которое флоу должен развернуться и стартовать
